<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Studio Pro V1.5.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }
        .checkerboard {
            background-image: linear-gradient(45deg, #2d3748 25%, transparent 25%),
                              linear-gradient(-45deg, #2d3748 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #2d3748 75%),
                              linear-gradient(-45deg, transparent 75%, #2d3748 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; background-color: #1a202c;
        }
        .grid-line { stroke: #f43f5e; stroke-width: 2; stroke-dasharray: 4 4; opacity: 0.6; cursor: move; }
        .grid-line:hover { stroke: #3b82f6; opacity: 1; stroke-dasharray: none; }
        .grid-line-hitbox { stroke: transparent; stroke-width: 15; cursor: move; }
        .col-resize { cursor: ew-resize; }
        .row-resize { cursor: ns-resize; }
        input[type=range] { -webkit-appearance: none; background: #334155; height: 6px; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #3b82f6; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <!-- 安全遮罩（偵測到非法操作時顯示） -->
    <div id="security-lock" class="fixed inset-0 bg-slate-950 z-[9999] flex flex-col items-center justify-center hidden p-8 text-center">
        <i data-lucide="shield-alert" class="w-20 h-20 text-red-500 mb-6"></i>
        <h2 class="text-3xl font-black text-white mb-2">檢測到非法分析行為</h2>
        <p class="text-slate-400">為了保護智慧財產權，本工具在開發者模式下無法使用。</p>
        <button onclick="location.reload()" class="mt-8 bg-blue-600 px-6 py-2 rounded-xl">重整網頁</button>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="flex flex-col md:flex-row items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                    Sticker Studio Pro <span class="text-lg opacity-80">V1.5.1</span>
                </h1>
                <p class="text-slate-400 text-sm mt-1">智慧裁切去背・安全增強版本</p>
            </div>
            <div class="flex gap-3">
                <button onclick="location.reload()" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg border border-slate-700 transition-all flex items-center gap-2 text-white">
                    <i data-lucide="refresh-cw" class="w-4 h-4 text-slate-400"></i> 重設全部
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 控制區 -->
            <section class="lg:col-span-4 space-y-6">
                <div id="drop-zone" class="bg-slate-900 border-2 border-dashed border-slate-700 rounded-3xl p-10 text-center hover:border-blue-500 transition-all cursor-pointer group shadow-2xl">
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                    <i data-lucide="image-up" class="w-12 h-12 text-slate-500 mx-auto mb-4 group-hover:text-blue-400 transition-colors"></i>
                    <p class="font-bold text-white text-lg">點擊或拖放貼圖圖片</p>
                </div>

                <div id="settings-card" class="bg-slate-900/50 border border-slate-800 rounded-3xl p-6 space-y-6 hidden backdrop-blur-sm shadow-xl">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs text-slate-500 font-bold uppercase">列數 (Rows)</label>
                            <input type="number" id="input-rows" value="2" min="1" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 outline-none focus:ring-2 ring-blue-500 text-white font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs text-slate-500 font-bold uppercase">行數 (Cols)</label>
                            <input type="number" id="input-cols" value="4" min="1" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 outline-none focus:ring-2 ring-blue-500 text-white font-bold">
                        </div>
                    </div>

                    <div class="pt-4 border-t border-slate-800">
                        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                            <i data-lucide="scissors" class="w-4 h-4 text-emerald-400"></i> 去背設定
                        </h3>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between p-3 bg-slate-800/50 rounded-2xl border border-slate-800">
                                <span class="text-xs text-slate-300 font-bold">去背基準色</span>
                                <div class="flex items-center gap-3">
                                    <div id="bg-color-preview" class="w-8 h-8 rounded-full border-2 border-slate-600 shadow-inner" style="background-color: rgb(255, 255, 255);"></div>
                                    <button id="btn-pick-color" class="bg-blue-600 hover:bg-blue-500 p-2 rounded-xl transition-all text-white">
                                        <i data-lucide="pipette" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                            <input type="range" id="range-tolerance" min="0" max="100" value="30" class="w-full">
                        </div>
                    </div>

                    <div class="pt-6 space-y-3">
                        <button id="btn-process" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white py-4 rounded-2xl font-bold shadow-xl shadow-blue-900/20 flex items-center justify-center gap-2 transition-transform active:scale-95">
                            <i data-lucide="zap" class="w-5 h-5"></i> 執行智慧裁切
                        </button>
                        <button id="btn-change-img" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-2xl font-semibold text-sm transition-all flex items-center justify-center gap-2">
                            <i data-lucide="image-plus" class="w-4 h-4 text-slate-400"></i> 重新上傳
                        </button>
                    </div>
                </div>

                <div id="status-bar" class="hidden bg-slate-900 border border-slate-800 rounded-2xl p-4 flex items-center gap-4 shadow-lg">
                    <div id="status-spinner" class="relative w-5 h-5 flex items-center justify-center">
                        <i data-lucide="loader-2" class="w-5 h-5 text-blue-500 animate-spin"></i>
                    </div>
                    <span id="status-text" class="text-xs text-slate-300 font-medium">準備中...</span>
                </div>
            </section>

            <!-- 畫布區 -->
            <section class="lg:col-span-8 flex flex-col gap-6">
                <div id="canvas-container" class="relative bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden flex flex-col hidden h-[600px] shadow-2xl">
                    <div class="flex-1 relative overflow-hidden flex items-center justify-center checkerboard" id="canvas-viewport">
                        <img id="main-image" class="max-w-full max-h-full object-contain pointer-events-none select-none opacity-0 transition-opacity duration-500">
                        <svg id="grid-overlay" class="absolute inset-0 w-full h-full cursor-crosshair"></svg>
                    </div>
                    
                    <div class="absolute bottom-4 right-4 z-20">
                        <div class="bg-slate-900/90 backdrop-blur-md p-2.5 rounded-2xl border border-slate-700 shadow-2xl ring-1 ring-white/5">
                            <canvas id="preview-canvas-mini" width="120" height="120" class="rounded-xl checkerboard shadow-inner"></canvas>
                        </div>
                    </div>
                </div>

                <div id="results-area" class="space-y-4 hidden">
                    <div class="flex items-center justify-between px-2">
                        <h2 class="text-lg font-bold flex items-center gap-2">處理結果</h2>
                        <button id="btn-download-zip" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded-xl font-bold text-sm flex items-center gap-2 shadow-lg shadow-emerald-900/20 transition-all">
                            <i data-lucide="download" class="w-4 h-4"></i> 打包 ZIP
                        </button>
                    </div>
                    <div id="sticker-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-4 pb-12"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        /**
         * 🔒 安全防護機制 - 防止非法下載
         */
        (function() {
            // 1. 禁用右鍵選單
            document.addEventListener('contextmenu', e => e.preventDefault());

            // 2. 禁用快捷鍵 (F12, Ctrl+Shift+I, Ctrl+U)
            document.onkeydown = function(e) {
                if (e.keyCode == 123) return false;
                if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
                if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            };

            // 3. 無限 Debugger 陷阱 (開啟開發者工具會卡死)
            setInterval(function() {
                const startTime = performance.now();
                (function() { return false; })["constructor"]("debugger")();
                const endTime = performance.now();
                if (endTime - startTime > 100) {
                    document.getElementById('security-lock').classList.remove('hidden');
                }
            }, 1000);
        })();

        lucide.createIcons();

        let state = {
            originalImg: null, rows: 2, cols: 4, hLines: [0.5], vLines: [0.25, 0.5, 0.75],
            activeLine: null, bgColor: { r: 255, g: 255, b: 255 }, tolerance: 30, results: [], isProcessing: false
        };

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const mainImage = document.getElementById('main-image');
        const gridOverlay = document.getElementById('grid-overlay');
        const miniPreview = document.getElementById('preview-canvas-mini');
        const stickerGrid = document.getElementById('sticker-grid');
        const resultsArea = document.getElementById('results-area');
        const statusBar = document.getElementById('status-bar');
        const statusText = document.getElementById('status-text');
        const settingsCard = document.getElementById('settings-card');
        const canvasContainer = document.getElementById('canvas-container');
        const btnChangeImg = document.getElementById('btn-change-img');
        const bgColorPreview = document.getElementById('bg-color-preview');

        dropZone.onclick = () => fileInput.click();
        btnChangeImg.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { const file = e.target.files[0]; if (file) loadImage(file); e.target.value = ''; };

        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    state.originalImg = img;
                    mainImage.src = e.target.result;
                    mainImage.classList.remove('opacity-0');
                    dropZone.classList.add('hidden');
                    settingsCard.classList.remove('hidden');
                    canvasContainer.classList.remove('hidden');
                    resultsArea.classList.add('hidden');
                    detectBackgroundColor(img);
                    resetGrid();
                    updateMiniPreview();
                    updateStatus("圖片載入成功", "check");
                    lucide.createIcons();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function detectBackgroundColor(img) {
            const canvas = document.createElement('canvas');
            canvas.width = img.width; canvas.height = img.height;
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
            const samples = [ctx.getImageData(5, 5, 1, 1).data, ctx.getImageData(img.width-5, 5, 1, 1).data];
            state.bgColor = { r: samples[0][0], g: samples[0][1], b: samples[0][2] };
            bgColorPreview.style.backgroundColor = `rgb(${state.bgColor.r},${state.bgColor.g},${state.bgColor.b})`;
        }

        function resetGrid() {
            state.rows = parseInt(document.getElementById('input-rows').value) || 2;
            state.cols = parseInt(document.getElementById('input-cols').value) || 4;
            state.hLines = []; state.vLines = [];
            for(let i=1; i<state.rows; i++) state.hLines.push(i/state.rows);
            for(let i=1; i<state.cols; i++) state.vLines.push(i/state.cols);
            renderGrid();
        }

        document.getElementById('input-rows').onchange = resetGrid;
        document.getElementById('input-cols').onchange = resetGrid;

        function renderGrid() {
            if (!state.originalImg) return;
            const w = mainImage.clientWidth, h = mainImage.clientHeight;
            const l = mainImage.offsetLeft, t = mainImage.offsetTop;
            let html = '';
            state.vLines.forEach((p, idx) => {
                const x = l + w * p;
                html += `<g class="col-resize" onmousedown="startDrag('v', ${idx})"><line x1="${x}" y1="${t}" x2="${x}" y2="${t+h}" class="grid-line-hitbox" /><line x1="${x}" y1="${t}" x2="${x}" y2="${t+h}" class="grid-line" /></g>`;
            });
            state.hLines.forEach((p, idx) => {
                const y = t + h * p;
                html += `<g class="row-resize" onmousedown="startDrag('h', ${idx})"><line x1="${l}" y1="${y}" x2="${l+w}" y2="${y}" class="grid-line-hitbox" /><line x1="${l}" y1="${y}" x2="${l+w}" y2="${y}" class="grid-line" /></g>`;
            });
            gridOverlay.innerHTML = html;
        }

        window.startDrag = (type, index) => { state.activeLine = { type, index }; document.addEventListener('mousemove', handleDrag); document.addEventListener('mouseup', endDrag); };
        function handleDrag(e) {
            if (!state.activeLine) return;
            const rect = mainImage.getBoundingClientRect();
            const val = Math.max(0.01, Math.min(0.99, state.activeLine.type === 'v' ? (e.clientX - rect.left) / rect.width : (e.clientY - rect.top) / rect.height));
            if (state.activeLine.type === 'v') { state.vLines[state.activeLine.index] = val; state.vLines.sort((a,b)=>a-b); }
            else { state.hLines[state.activeLine.index] = val; state.hLines.sort((a,b)=>a-b); }
            renderGrid(); updateMiniPreview();
        }
        function endDrag() { state.activeLine = null; document.removeEventListener('mousemove', handleDrag); document.removeEventListener('mouseup', endDrag); }

        gridOverlay.addEventListener('click', (e) => {
            if (state.activeLine) return;
            const rect = mainImage.getBoundingClientRect();
            const canvas = document.createElement('canvas');
            canvas.width = state.originalImg.width; canvas.height = state.originalImg.height;
            const ctx = canvas.getContext('2d'); ctx.drawImage(state.originalImg, 0, 0);
            const pixel = ctx.getImageData(((e.clientX - rect.left) / rect.width) * canvas.width, ((e.clientY - rect.top) / rect.height) * canvas.height, 1, 1).data;
            state.bgColor = { r: pixel[0], g: pixel[1], b: pixel[2] };
            bgColorPreview.style.backgroundColor = `rgb(${pixel[0]},${pixel[1]},${pixel[2]})`;
            updateMiniPreview();
        });

        document.getElementById('range-tolerance').oninput = (e) => {
            state.tolerance = parseInt(e.target.value);
            document.getElementById('val-tolerance').innerText = state.tolerance;
            updateMiniPreview();
        };

        function processSmartFit(inputCanvas, targetSize = 320) {
            const ctx = inputCanvas.getContext('2d');
            const data = ctx.getImageData(0, 0, inputCanvas.width, inputCanvas.height).data;
            let minX = inputCanvas.width, minY = inputCanvas.height, maxX = 0, maxY = 0, found = false;
            for (let y = 0; y < inputCanvas.height; y++) {
                for (let x = 0; x < inputCanvas.width; x++) {
                    if (data[(y * inputCanvas.width + x) * 4 + 3] > 10) {
                        minX = Math.min(minX, x); minY = Math.min(minY, y);
                        maxX = Math.max(maxX, x); maxY = Math.max(maxY, y);
                        found = true;
                    }
                }
            }
            if (!found) return inputCanvas.toDataURL('image/png');
            const out = document.createElement('canvas'); out.width = out.height = targetSize;
            const octx = out.getContext('2d');
            const contentW = maxX - minX + 1, contentH = maxY - minY + 1;
            const scale = Math.min((targetSize * 0.9) / contentW, (targetSize * 0.9) / contentH);
            const finalW = contentW * scale, finalH = contentH * scale;
            octx.drawImage(inputCanvas, minX, minY, contentW, contentH, (targetSize - finalW) / 2, (targetSize - finalH) / 2, finalW, finalH);
            return out.toDataURL('image/png');
        }

        function updateMiniPreview() {
            if (!state.originalImg) return;
            const v = [0, ...state.vLines, 1].sort((a,b)=>a-b), h = [0, ...state.hLines, 1].sort((a,b)=>a-b);
            const sw = (v[1]-v[0])*state.originalImg.width, sh = (h[1]-h[0])*state.originalImg.height;
            const temp = document.createElement('canvas'); temp.width = sw; temp.height = sh;
            const tctx = temp.getContext('2d'); tctx.drawImage(state.originalImg, v[0]*state.originalImg.width, h[0]*state.originalImg.height, sw, sh, 0, 0, sw, sh);
            processChromaKey(temp);
            const miniCtx = miniPreview.getContext('2d'); miniCtx.clearRect(0,0,120,120);
            const finalImg = new Image(); finalImg.onload = () => miniCtx.drawImage(finalImg, 0, 0); finalImg.src = processSmartFit(temp, 120);
        }

        function processChromaKey(canvas) {
            const ctx = canvas.getContext('2d'); const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const d = imgData.data; const { r, g, b } = state.bgColor; const t = state.tolerance;
            for (let i = 0; i < d.length; i += 4) if (Math.abs(d[i]-r)<t && Math.abs(d[i+1]-g)<t && Math.abs(d[i+2]-b)<t) d[i+3]=0;
            ctx.putImageData(imgData, 0, 0);
        }

        document.getElementById('btn-process').onclick = async () => {
            if (state.isProcessing) return;
            state.isProcessing = true;
            updateStatus("裁切與置中處理中...", "loader-2", true);
            resultsArea.classList.add('hidden'); stickerGrid.innerHTML = ''; state.results = [];
            const v = [0, ...state.vLines, 1].sort((a,b)=>a-b), h = [0, ...state.hLines, 1].sort((a,b)=>a-b);
            let count = 0;
            for (let r = 0; r < state.rows; r++) {
                for (let c = 0; c < state.cols; c++) {
                    const sx = v[c]*state.originalImg.width, sy = h[r]*state.originalImg.height;
                    const sw = (v[c+1]-v[c])*state.originalImg.width, sh = (h[r+1]-h[r])*state.originalImg.height;
                    const crop = document.createElement('canvas'); crop.width = sw; crop.height = sh;
                    crop.getContext('2d').drawImage(state.originalImg, sx, sy, sw, sh, 0, 0, sw, sh);
                    processChromaKey(crop);
                    const finalUrl = processSmartFit(crop, 320);
                    const name = `sticker_${++count}`;
                    state.results.push({ name, url: finalUrl });
                    renderResultCard(name, finalUrl, count-1);
                }
            }
            resultsArea.classList.remove('hidden'); updateStatus("處理完成", "check-circle");
            state.isProcessing = false;
        };

        function renderResultCard(name, url, index) {
            const div = document.createElement('div');
            div.className = "bg-slate-900 border border-slate-800 rounded-2xl p-3 flex flex-col gap-3 group hover:border-blue-500 transition-all";
            div.innerHTML = `<div class="aspect-square checkerboard rounded-xl flex items-center justify-center p-2 overflow-hidden"><img src="${url}" class="max-w-full max-h-full object-contain group-hover:scale-110 transition-transform"></div><input type="text" value="${name}" onchange="state.results[${index}].name = this.value" class="bg-slate-800 border border-slate-700 rounded-lg px-2 py-1 text-[11px] font-bold text-center outline-none focus:ring-1 ring-blue-500 w-full text-white"><button onclick="downloadOne('${url}', '${name}')" class="text-[10px] bg-slate-800 hover:bg-emerald-600 py-1.5 rounded-lg font-bold transition-colors">下載</button>`;
            stickerGrid.appendChild(div);
        }

        window.downloadOne = (url, name) => { const a = document.createElement('a'); a.href = url; a.download = `${name}.png`; a.click(); };
        document.getElementById('btn-download-zip').onclick = async () => {
            const zip = new JSZip(); state.results.forEach(res => zip.file(`${res.name}.png`, res.url.split(',')[1], { base64: true }));
            const a = document.createElement('a'); a.href = URL.createObjectURL(await zip.generateAsync({ type: "blob" })); a.download = `stickers_V1.5.1.zip`; a.click();
        };

        function updateStatus(text, icon, spin = false) {
            statusBar.classList.remove('hidden'); statusText.innerText = text;
            document.getElementById('status-spinner').innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 ${spin ? 'animate-spin text-blue-500' : 'text-emerald-500'}"></i>`;
            lucide.createIcons();
        }
        window.onresize = renderGrid;
    </script>
</body>
</html>
