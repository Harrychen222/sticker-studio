<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Studio Pro V1.5.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        .checkerboard { background-image: linear-gradient(45deg, #2d3748 25%, transparent 25%), linear-gradient(-45deg, #2d3748 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #2d3748 75%), linear-gradient(-45deg, transparent 75%, #2d3748 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; background-color: #1a202c; }
        .grid-line { stroke: #f43f5e; stroke-width: 2; stroke-dasharray: 4 4; opacity: 0.6; cursor: move; }
        .grid-line:hover { stroke: #3b82f6; opacity: 1; stroke-dasharray: none; }
        .grid-line-hitbox { stroke: transparent; stroke-width: 15; cursor: move; }
        .col-resize { cursor: ew-resize; } .row-resize { cursor: ns-resize; }
        input[type=range] { -webkit-appearance: none; background: #334155; height: 6px; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #3b82f6; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="security-lock" class="fixed inset-0 bg-slate-950 z-[9999] flex flex-col items-center justify-center hidden p-8 text-center">
        <i data-lucide="shield-alert" class="w-20 h-20 text-red-500 mb-6"></i>
        <h2 class="text-3xl font-black text-white mb-2">檢測到非法分析或非授權存取</h2>
        <p class="text-slate-400">為了保護智慧財產權，本工具僅限於官方授權網域使用且禁止在開發者模式下運行。</p>
        <button onclick="location.reload()" class="mt-8 bg-blue-600 px-6 py-2 rounded-xl text-white font-bold shadow-lg">重整網頁</button>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="flex flex-col md:flex-row items-center justify-between mb-8 gap-4 text-white">
            <div>
                <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                    Sticker Studio Pro <span class="text-lg opacity-80">V1.5.1</span>
                </h1>
                <p class="text-slate-400 text-sm mt-1">智慧裁切去背・最終保護版</p>
            </div>
            <div class="flex gap-3">
                <button onclick="location.reload()" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg border border-slate-700 transition-all flex items-center gap-2 text-white shadow-md">
                    <i data-lucide="refresh-cw" class="w-4 h-4 text-slate-400"></i> 重設全部
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <section class="lg:col-span-4 space-y-6">
                <div id="drop-zone" class="bg-slate-900 border-2 border-dashed border-slate-700 rounded-3xl p-10 text-center hover:border-blue-500 transition-all cursor-pointer group shadow-2xl">
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                    <i data-lucide="image-up" class="w-12 h-12 text-slate-500 mx-auto mb-4 group-hover:text-blue-400 transition-colors"></i>
                    <p class="font-bold text-white text-lg">載入貼圖大圖</p>
                </div>

                <div id="settings-card" class="bg-slate-900/50 border border-slate-800 rounded-3xl p-6 space-y-6 hidden backdrop-blur-sm shadow-xl text-white">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs text-slate-500 font-bold uppercase tracking-widest">Rows</label>
                            <input type="number" id="input-rows" value="2" min="1" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 outline-none focus:ring-2 ring-blue-500 text-white font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs text-slate-500 font-bold uppercase tracking-widest">Cols</label>
                            <input type="number" id="input-cols" value="4" min="1" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 outline-none focus:ring-2 ring-blue-500 text-white font-bold">
                        </div>
                    </div>
                    <div class="pt-4 border-t border-slate-800">
                        <div class="flex items-center justify-between p-3 bg-slate-800/50 rounded-2xl border border-slate-800">
                            <span class="text-xs text-slate-300 font-bold">選色去背</span>
                            <div class="flex items-center gap-3">
                                <div id="bg-color-preview" class="w-8 h-8 rounded-full border-2 border-slate-600 shadow-inner" style="background-color: rgb(255, 255, 255);"></div>
                                <button id="btn-pick-color" class="bg-blue-600 hover:bg-blue-500 p-2 rounded-xl transition-all text-white"><i data-lucide="pipette" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <input type="range" id="range-tolerance" min="0" max="100" value="30" class="w-full mt-4">
                    </div>
                    <button id="btn-process" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white py-4 rounded-2xl font-bold shadow-xl shadow-blue-900/20 flex items-center justify-center gap-2 transition-transform active:scale-95"><i data-lucide="zap" class="w-5 h-5"></i> 執行智慧裁切</button>
                    <button id="btn-change-img" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-2xl font-semibold text-sm transition-all flex items-center justify-center gap-2 text-white">更換圖片</button>
                </div>
            </section>

            <section class="lg:col-span-8 flex flex-col gap-6">
                <div id="canvas-container" class="relative bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden flex flex-col hidden h-[600px] shadow-2xl">
                    <div class="flex-1 relative overflow-hidden flex items-center justify-center checkerboard" id="canvas-viewport">
                        <img id="main-image" class="max-w-full max-h-full object-contain pointer-events-none select-none opacity-0 transition-opacity duration-500">
                        <svg id="grid-overlay" class="absolute inset-0 w-full h-full cursor-crosshair"></svg>
                    </div>
                    <div class="absolute bottom-4 right-4 z-20"><div class="bg-slate-900/90 backdrop-blur-md p-2.5 rounded-2xl border border-slate-700 shadow-2xl ring-1 ring-white/5"><canvas id="preview-canvas-mini" width="120" height="120" class="rounded-xl checkerboard shadow-inner"></canvas></div></div>
                </div>
                <div id="results-area" class="space-y-4 hidden">
                    <div class="flex items-center justify-between px-2"><h2 class="text-lg font-bold flex items-center gap-2 text-white">輸出結果 (320px)</h2><button id="btn-download-zip" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded-xl font-bold text-sm flex items-center gap-2 shadow-lg shadow-emerald-900/20 transition-all"><i data-lucide="download" class="w-4 h-4"></i> 下載全部 ZIP</button></div>
                    <div id="sticker-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-4 pb-12"></div>
                </div>
            </section>
        </main>
    </div>
